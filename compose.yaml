services:
  bridge:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - bot/.env
    environment:
      PORT: 8787
      IDENTITY_STORE_PATH: /data/identities.json
      MATRIX_SYNC_STORE_PATH: /data/matrix-sync.json
      SITE_REGISTRY_PATH: /data/sites.json
    ports:
      - "8787:8787"
    volumes:
      - hello-bridge-data:/data
    restart: unless-stopped

volumes:
  hello-bridge-data:
